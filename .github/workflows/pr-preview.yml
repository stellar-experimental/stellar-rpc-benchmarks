name: PR preview

# Deploy each PR's docs/ to gh-pages:/pr-preview/pr-<number>/ and comment the
# preview URL on the PR. The preview is deleted when the PR closes.
# Runs on every PR (no paths filter): the close-time cleanup must always fire,
# and deploying an unchanged docs/ is harmless. PRs from forks are not
# previewed — their GITHUB_TOKEN is read-only.
on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency: preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache-bust viewer assets
        # Same content-hash stamping as deploy-pages.yml. Matters more here: the
        # preview URL is constant across pushes to a PR, so without it a browser
        # keeps serving the cached app.js/styles.css while you iterate. Harmless on
        # the close event (nothing is deployed then).
        run: |
          app_hash=$(sha256sum docs/app.js | cut -c1-8)
          css_hash=$(sha256sum docs/styles.css | cut -c1-8)
          sed -i "s|href=\"styles.css\"|href=\"styles.css?v=${css_hash}\"|" docs/index.html
          sed -i "s|src=\"app.js\"|src=\"app.js?v=${app_hash}\"|" docs/index.html

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: docs
