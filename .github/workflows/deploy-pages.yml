name: Deploy site

# Sync main:/docs to the gh-pages branch, which GitHub Pages serves.
# "Deploy = commit to main" still holds — this runs on every docs/ change.
# PR previews live under gh-pages:/pr-preview/ (see pr-preview.yml) and are
# preserved via clean-exclude.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

concurrency: gh-pages-sync

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache-bust viewer assets
        # Pages serves app.js/styles.css with a 10-min max-age and browsers cache
        # them, so viewer code changes weren't visible without a manual cache clear.
        # Stamp a content hash onto each asset URL in index.html: the URL changes
        # only when the file's bytes change, so run-only deploys keep the cache warm
        # while viewer edits force a re-fetch. Runs on the ephemeral checkout only —
        # main stays unstamped, so `make serve` and the smoke test are unaffected.
        run: |
          app_hash=$(sha256sum docs/app.js | cut -c1-8)
          css_hash=$(sha256sum docs/styles.css | cut -c1-8)
          sed -i "s|href=\"styles.css\"|href=\"styles.css?v=${css_hash}\"|" docs/index.html
          sed -i "s|src=\"app.js\"|src=\"app.js?v=${app_hash}\"|" docs/index.html

      - name: Deploy docs/ to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          clean-exclude: pr-preview
          force: false
